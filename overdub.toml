# overdub pipeline config — flat keys override the defaults in overdub/config.py.
# Uncomment and edit any key to override.

# work_root = "work"
# output_dir = "out"        # named final MKVs: "<title> [<video id>].mkv"

# --- STT (faster-whisper) ---
# whisper_model = "large-v3"
# whisper_device = "cuda"
# whisper_compute_type = "float16"
# whisper_condition_on_previous = true   # context → proper punctuation; false only if a
#                                        # source makes whisper loop on repeats
#   NOTE 2026-07-19: 4szRHy_CT7s was re-transcribed with this set to FALSE — that source
#   loops on repeats (170 degenerate 0.02s word stamps, 2 duplicate sentence pairs, one
#   slot at 294 char/s → atempo ×8.79). With it off: 0 degenerate, 0 dups, max 24 char/s,
#   and no overlong terminator-free blocks came back. Per-source escape hatch, not a default.

# repair_window_min_sec = 8.0   # --repair-asr: widen a defect window to at least this many seconds.
#                               # NOT a free dial. Widening pulls unflagged neighbours into the
#                               # replaced range and overwrites them with the window's own reading:
#                               # measured once as a correction, once as a degradation (DECISIONS
#                               # 2026-07-20). Raise it → more audio to decode, bigger blast radius.
#                               # Lower it → the clip loses the context that makes re-ASR credible.
#                               # 8-18 s is the band the 7 manual repairs worked in — a reported
#                               # range, never a calibrated one.
#                               # (no max key — a window has no upper bound; see repair.widen)

# --- translation (Gemma-3-12B via Ollama native /api/chat) ---
# ollama_base_url = "http://localhost:11434"
# ollama_model = "gemma3:12b"
# num_ctx = 4096
# context_window = 4

# --- TTS engine selection ---
tts_engine = "f5"           # production engine (Phase-3 ear check passed); "silero" = fallback
tts_voice = "eugene"        # silero-only; ear ranking 2026-07-19 on v5_5_ru: eugene + kseniya
                            # best, xenia good-but-slightly-unpleasant, aidar/baya have an
                            # off-standard accent that is harder to follow. "kseniya" = backup
# silero_model = "v5_5_ru"  # default; "v4_ru" only to reproduce pre-2026-07-19 runs
tts_sample_rate = 48000     # silero-only (F5 sr is engine-owned: 24000)
# tts_seed = 42             # base seed for seed-capable engines; retries use seed+attempt
# tts_max_retries = 3       # reseed attempts after the first try (seed-capable engines only)

# --- TTS F5/ESpeech (worker process in .venv-f5tts) ---
# f5_python = ".venv-f5tts/Scripts/python.exe"
# f5_ckpt = "models/espeech-rlv2/espeech_tts_rlv2.pt"
# f5_vocab = "models/espeech-rlv2/vocab.txt"
# f5_ref_audio = "models/refs/ref_espeech_demo.wav"    # narrator = reference clip (fetched at setup)
# f5_ref_text = "models/refs/ref_espeech_demo.txt"     # exact transcript of the reference
# f5_nfe = 16                # default since 2026-07-19 (was 48). Ear-checked on a full video:
                              # 2.16x per unit, no audible cost. 16 is EPSS-tuned, 48/32 are not.
                              # Set 48 only to reproduce pre-2026-07-19 renders.
# f5_speed = 1.0             # base narrator pace (narrator calibration)
# f5_speed_floor = 0.75      # max stretch (slot-fill), multiplier of f5_speed; 1.0 disables
# f5_speed_ceil = 1.1        # max native compression before atempo tops up; native ≥~1.3
                              # drops words mid-word (ear 2026-07-16) — keep ≲1.15; 1.0 disables

# --- dead-air / mix ---
# group_gap_max = 0.4        # join adjacent sentences into one render unit (s); 0.0 disables
# dub_mix = "bed"            # "replace" | "duck" | "bed" — production default: bed (no-vocals
                              # stem at original level under the dub; ear 2026-07-17)
# demucs_python = ".venv-demucs/Scripts/python.exe"

